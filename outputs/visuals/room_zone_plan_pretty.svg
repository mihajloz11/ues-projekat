<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <linearGradient id="floor" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#f4efe2"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f6c37a"/>
      <stop offset="1" stop-color="#d79245"/>
    </linearGradient>
    <linearGradient id="bed" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#dcefff"/>
      <stop offset="1" stop-color="#a9cdea"/>
    </linearGradient>
    <linearGradient id="wardrobe" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#c79562"/>
      <stop offset="1" stop-color="#8a5d36"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#22303a" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      .title { font: 800 42px Segoe UI, Arial, sans-serif; fill: #14212b; }
      .subtitle { font: 400 21px Segoe UI, Arial, sans-serif; fill: #52626e; }
      .room-border { fill: url(#floor); stroke: #18242d; stroke-width: 12; }
      .wall-text { font: 600 18px Segoe UI, Arial, sans-serif; fill: #566673; }
      .f-label { font: 800 22px Segoe UI, Arial, sans-serif; fill: #2a2119; }
      .f-small { font: 500 15px Segoe UI, Arial, sans-serif; fill: #4c3b2b; }
      .white-label { font: 800 23px Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .white-small { font: 600 15px Segoe UI, Arial, sans-serif; fill: #f4fbff; }
      .zone-title { font: 900 26px Segoe UI, Arial, sans-serif; fill: #17232d; }
      .zone-sub { font: 600 17px Segoe UI, Arial, sans-serif; fill: #354a58; }
      .esp-title { font: 900 22px Segoe UI, Arial, sans-serif; fill: #101820; }
      .esp-sub { font: 600 16px Segoe UI, Arial, sans-serif; fill: #3d4b55; }
      .note-title { font: 900 24px Segoe UI, Arial, sans-serif; fill: #14212b; }
      .note { font: 500 17px Segoe UI, Arial, sans-serif; fill: #344550; }
      .tiny { font: 500 14px Segoe UI, Arial, sans-serif; fill: #5a6a75; }
      .zone { stroke-width: 5; stroke-dasharray: 14 10; }
      .z1 { fill: rgba(87, 167, 232, 0.22); stroke: #2d84c7; }
      .z2 { fill: rgba(74, 189, 113, 0.24); stroke: #2f9d58; }
      .z3 { fill: rgba(240, 173, 58, 0.27); stroke: #d28a12; }
      .z4 { fill: rgba(145, 100, 214, 0.20); stroke: #8059c7; }
      .door { stroke: #9d0622; stroke-width: 12; stroke-linecap: round; }
      .wifi-main { stroke: #156dcc; stroke-width: 7; stroke-dasharray: 20 14; fill: none; }
      .wifi-glow { stroke: #4ba5ff; stroke-width: 70; opacity: 0.15; fill: none; }
      .card { fill: #ffffff; stroke: #d7dee4; stroke-width: 2; }
      .esp-card { fill: #ffffff; stroke: #111b23; stroke-width: 4; }
      .person-head { fill: #d44832; stroke: #8a2115; stroke-width: 4; }
      .person-body { stroke: #8a2115; stroke-width: 6; stroke-linecap: round; }
      .esp-chip { fill: #15222b; stroke: #ffffff; stroke-width: 5; }
      .pin-line { stroke: #15222b; stroke-width: 4; }
    </style>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L12,5 z" fill="#156dcc"/>
    </marker>
  </defs>

  <rect width="1800" height="1100" fill="#edf2f6"/>
  <text class="title" x="90" y="72">Plan postavke ESP32 i zona snimanja</text>
  <text class="subtitle" x="90" y="110">Top-down sema tvoje sobe: sto, pec, krevet, ormar, vrata, ESP32 pozicije i zone gdje stojis tokom snimanja.</text>

  <!-- Room -->
  <rect class="room-border" x="115" y="175" width="1120" height="590" rx="8" filter="url(#shadow)"/>
  <text class="wall-text" x="610" y="155">400 cm</text>
  <text class="wall-text" x="1260" y="480">210 cm</text>

  <!-- Subtle floor planks -->
  <g opacity="0.18">
    <line x1="140" y1="235" x2="1210" y2="235" stroke="#b9a982"/>
    <line x1="140" y1="310" x2="1210" y2="310" stroke="#b9a982"/>
    <line x1="140" y1="385" x2="1210" y2="385" stroke="#b9a982"/>
    <line x1="140" y1="460" x2="1210" y2="460" stroke="#b9a982"/>
    <line x1="140" y1="535" x2="1210" y2="535" stroke="#b9a982"/>
    <line x1="140" y1="610" x2="1210" y2="610" stroke="#b9a982"/>
    <line x1="140" y1="685" x2="1210" y2="685" stroke="#b9a982"/>
  </g>

  <!-- Door -->
  <line class="door" x1="115" y1="470" x2="115" y2="645"/>
  <text class="zone-sub" x="48" y="565" fill="#8a0016">vrata</text>

  <!-- Stove -->
  <rect x="155" y="215" width="285" height="205" rx="18" fill="#e53935" filter="url(#shadow)"/>
  <rect x="178" y="238" width="239" height="159" rx="12" fill="#ffefef" opacity="0.78"/>
  <text class="white-label" x="270" y="310">PEC</text>
  <text class="white-small" x="218" y="338">popunjava ugao zida</text>

  <!-- Desk -->
  <rect x="465" y="210" width="390" height="185" rx="18" fill="url(#desk)" filter="url(#shadow)"/>
  <rect x="505" y="250" width="155" height="75" rx="9" fill="#2f3842" opacity="0.92"/>
  <text class="f-label" x="690" y="285">STO</text>
  <text class="f-small" x="675" y="315">laptop ovdje</text>

  <!-- Bed -->
  <rect x="975" y="210" width="220" height="505" rx="22" fill="url(#bed)" filter="url(#shadow)"/>
  <rect x="1005" y="240" width="160" height="85" rx="16" fill="#f8fbff" opacity="0.9"/>
  <text class="f-label" x="1045" y="430">KREVET</text>
  <text class="f-small" x="1015" y="460">mozes sjesti</text>

  <!-- Wardrobe -->
  <rect x="440" y="545" width="500" height="165" rx="18" fill="url(#wardrobe)" filter="url(#shadow)"/>
  <line x1="485" y1="675" x2="890" y2="575" stroke="#e7b170" stroke-width="8" stroke-linecap="round"/>
  <line x1="515" y1="575" x2="900" y2="680" stroke="#5e2f1c" stroke-width="8" stroke-linecap="round"/>
  <text class="white-label" x="640" y="628">ORMAR</text>
  <text class="white-small" x="602" y="657">tu ne stajati</text>

  <!-- Zones -->
  <rect class="zone z1" x="165" y="465" width="245" height="245" rx="24"/>
  <text class="zone-title" x="198" y="512">Z1</text>
  <text class="zone-sub" x="198" y="542">vrata / lijevo</text>

  <rect class="zone z2" x="540" y="410" width="290" height="125" rx="24"/>
  <text class="zone-title" x="582" y="458">Z2</text>
  <text class="zone-sub" x="582" y="488">sredina prolaza</text>

  <rect class="zone z3" x="945" y="485" width="250" height="225" rx="24"/>
  <text class="zone-title" x="995" y="550">Z3</text>
  <text class="zone-sub" x="995" y="580">krevet / desno</text>

  <rect class="zone z4" x="560" y="225" width="250" height="150" rx="24"/>
  <text class="zone-title" x="600" y="270">Z4</text>
  <text class="zone-sub" x="600" y="300">kod stola</text>
  <text class="tiny" x="600" y="326">opciono</text>

  <!-- Person icons -->
  <g>
    <circle class="person-head" cx="290" cy="595" r="24"/>
    <line class="person-body" x1="290" y1="620" x2="290" y2="670"/>
    <line class="person-body" x1="260" y1="642" x2="320" y2="642"/>
  </g>
  <g>
    <circle class="person-head" cx="710" cy="505" r="24"/>
    <line class="person-body" x1="710" y1="530" x2="710" y2="575"/>
    <line class="person-body" x1="680" y1="552" x2="740" y2="552"/>
  </g>
  <g>
    <circle class="person-head" cx="1080" cy="630" r="24"/>
    <line class="person-body" x1="1080" y1="655" x2="1080" y2="700"/>
    <line class="person-body" x1="1050" y1="677" x2="1110" y2="677"/>
  </g>

  <!-- ESP positions -->
  <path class="wifi-glow" d="M830 385 C870 430 925 500 990 545"/>
  <path class="wifi-main" marker-end="url(#arrowBlue)" d="M830 385 C870 430 925 500 990 545"/>
  <text class="zone-sub" x="790" y="500" fill="#156dcc">WiFi CSI link</text>

  <circle class="esp-chip" cx="830" cy="385" r="31"/>
  <rect class="esp-card" x="705" y="415" width="310" height="92" rx="16" filter="url(#shadow)"/>
  <text class="esp-title" x="730" y="452">ESP32-S3 receiver</text>
  <text class="esp-sub" x="730" y="478">na rub stola, uz laptop</text>
  <path class="pin-line" d="M830 415 L830 385"/>

  <circle class="esp-chip" cx="990" cy="545" r="31"/>
  <rect class="esp-card" x="1110" y="500" width="315" height="105" rx="16" filter="url(#shadow)"/>
  <text class="esp-title" x="1135" y="538">ESP32 sender</text>
  <text class="esp-sub" x="1135" y="564">na krevet / power bank</text>
  <text class="esp-sub" x="1135" y="586">ne mora biti u laptopu</text>
  <path class="pin-line" d="M1110 548 L990 545"/>

  <!-- Right panel -->
  <rect class="card" x="1285" y="175" width="420" height="590" rx="24" filter="url(#shadow)"/>
  <text class="note-title" x="1325" y="230">Redoslijed snimanja</text>
  <text class="note" x="1325" y="278">1. empty_room: niko u sobi</text>
  <text class="note" x="1325" y="322">2. Z1: vrata / lijevo</text>
  <text class="note" x="1325" y="366">3. Z2: sredina prolaza</text>
  <text class="note" x="1325" y="410">4. Z3: krevet / desno</text>
  <text class="note" x="1325" y="454">5. Z4: kod stola, opciono</text>
  <line x1="1325" y1="495" x2="1665" y2="495" stroke="#d7dee4" stroke-width="2"/>
  <text class="note-title" x="1325" y="540">Pravila</text>
  <text class="note" x="1325" y="582">• ESP module ne pomjerati</text>
  <text class="note" x="1325" y="620">• jedna sesija = jedna zona</text>
  <text class="note" x="1325" y="658">• 2-3 min po zoni za prvi test</text>
  <text class="note" x="1325" y="696">• Z2 je najbitnija zona</text>

  <!-- Bottom note -->
  <rect class="card" x="115" y="825" width="1120" height="150" rx="24" filter="url(#shadow)"/>
  <text class="note-title" x="155" y="878">Preporucena postavka</text>
  <text class="note" x="155" y="918">S3 neka ostane na stolu uz laptop, ali pomjeren prema sobi. Obicni ESP32 prebaci na krevet ili power bank.</text>
  <text class="note" x="155" y="950">Tvoje kretanje u Z2 najvise presijeca WiFi link, pa je ta zona najkorisnija za kalibraciju modela.</text>
</svg>
